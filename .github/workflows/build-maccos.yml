name: Build macOS VST3

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        run: brew install cmake

      - name: Show repository files
        run: ls -R

      - name: List schemes
        run: |
          xcodebuild -list -project "Builds/MacOSX/Flauto paleolitico di Divije Babe.xcodeproj"

      - name: Build VST3 only
        run: |
          set -o pipefail
          xcodebuild \
            -project "Builds/MacOSX/Flauto paleolitico di Divije Babe.xcodeproj" \
            -scheme "Flauto paleolitico di Divije Babe - VST3" \
            -configuration Release \
            SYMROOT="$GITHUB_WORKSPACE/build" \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild.log

      - name: Show errors only
        if: failure()
        run: |
          echo "=== ERRORS ==="
          grep -n "error:" xcodebuild.log || true
          echo "=== LAST 120 LINES ==="
          tail -120 xcodebuild.log || true

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: vst3-macos
          path: build/**/*.vst3
          if-no-files-found: error
